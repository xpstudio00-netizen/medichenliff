<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDICHEN - ตรวจสอบและแก้ไขออเดอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --ai-color: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        .header h2 {
            color: #2563eb;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #status-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .image-container {
            width: 100%;
            min-height: 150px;
            background: #f1f5f9;
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background-color: var(--surface);
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-ai {
            background: linear-gradient(135deg, var(--primary), var(--ai-color));
            color: white;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📋 ระบบยืนยันออเดอร์ (Confirm Order)</h2>
        <div id="status-text">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="card">
        <div class="card-title">🖼️ เอกสารอ้างอิง (PO)</div>
        <div class="image-container">
            <div id="img-placeholder" style="color: var(--text-muted); font-size: 14px;">กำลังโหลดรูปภาพเอกสาร...</div>
            <img id="po-image" src="" alt="เอกสารสั่งซื้อ">
        </div>
    </div>

    <div class="card">
        <form id="order-edit-form" onsubmit="event.preventDefault();">
            
            <div class="form-group">
                <label>วันที่คอนเฟิร์ม (อิงจากเอกสาร)</label>
                <input type="text" id="edit-confirm-date" class="form-control" placeholder="เช่น 15/6/69">
            </div>

            <div class="form-group">
                <label>ชื่อคนคอนเฟิร์ม (แอดมิน)</label>
                <input type="text" id="edit-admin-name" class="form-control" placeholder="ชื่อแอดมิน">
            </div>

            <div class="form-group">
                <label>ชื่อโรงพยาบาล / ลูกค้า</label>
                <input type="text" id="edit-hospital-name" class="form-control">
            </div>

            <div class="form-group">
                <label>เลขที่ผู้เสียภาษี</label>
                <input type="text" id="edit-tax-id" class="form-control">
            </div>

            <div class="form-group">
                <label>เบอร์โทรศัพท์</label>
                <input type="text" id="edit-phone" class="form-control">
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-success" id="save-btn" onclick="updateLineOrder()">💾 บันทึกข้อมูลออเดอร์</button>
                <button type="button" class="btn btn-ai" id="ai-btn" onclick="triggerAIOrderProcess()">🤖 สั่ง AI วิเคราะห์ใหม่อีกครั้ง</button>
            </div>
        </form>
    </div>

    <script>
        // 🔴 ลิงก์ Web App URL เดิมของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbzUSfC0UMS1rLJTpVBbL1koAKUkHZcLIlQvLz98J2UzSwFUo-2sdqckWaiXNoEGgWJd/exec";

        let currentOrderId = null;
        let isEditing = false;
        let refreshInterval = null;

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentOrderId = urlParams.get('id');

            if (!currentOrderId) {
                document.getElementById('status-text').innerText = "❌ ไม่พบรหัสออเดอร์ (ID) ใน URL";
                showToast('error', 'ข้อผิดพลาด', 'ไม่พบ ID ออเดอร์');
                return;
            }

            // เริ่มดึงข้อมูลครั้งแรก
            fetchOrderData();

            // เปิดระบบดึงข้อมูลอัตโนมัติทุก 5 วินาที
            startAutoRefresh();

            // ดักจับการพิมพ์เพื่อล็อกไม่ให้ระบบรีเฟรชทับข้อมูลที่พิมพ์อยู่
            setupEditListeners();
        });

        // ฟังก์ชันดึงข้อมูลจาก Sheets
        async function fetchOrderData() {
            if (isEditing) return;

            try {
                const response = await fetch(`${API_URL}?action=getOrder&id=${currentOrderId}`);
                const res = await response.json();

                if (res.status === 'success' && res.data) {
                    document.getElementById('status-text').innerText = `อัปเดตล่าสุดเมื่อ: ${new Date().toLocaleTimeString('th-TH')}`;
                    mapDataToForm(res.data);
                } else {
                    document.getElementById('status-text').innerText = "⚠️ ไม่พบข้อมูลออเดอร์นี้ในระบบ";
                }
            } catch (error) {
                console.error("Fetch data failed:", error);
                document.getElementById('status-text').innerText = "❌ เชื่อมต่อฐานข้อมูลล้มเหลว";
            }
        }

        // นำข้อมูลหยอดลงฟอร์มให้ตรง ID ช่องกรอกข้อมูล
        function mapDataToForm(data) {
            if (document.getElementById('edit-confirm-date')) document.getElementById('edit-confirm-date').value = data.confirmDate || '';
            if (document.getElementById('edit-admin-name')) document.getElementById('edit-admin-name').value = data.adminName || '';
            if (document.getElementById('edit-hospital-name')) document.getElementById('edit-hospital-name').value = data.hospitalName || data.company || '';
            if (document.getElementById('edit-tax-id')) document.getElementById('edit-tax-id').value = data.taxId || '';
            if (document.getElementById('edit-phone')) document.getElementById('edit-phone').value = data.phone || '';

            // แสดงรูปภาพเอกสาร (ถ้ามีลิงก์ส่งมาจาก Sheets)
            const poImage = document.getElementById('po-image');
            const placeholder = document.getElementById('img-placeholder');
            if (poImage && data.fileUrl) {
                poImage.src = data.fileUrl;
                poImage.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
            } else if (placeholder) {
                placeholder.innerText = "❌ ไม่พบไฟล์เอกสารแนบ";
            }
        }

        // บันทึกข้อมูลกลับไปที่ Sheets
        async function updateLineOrder() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            const loadingToast = showToast('loading', 'กำลังบันทึกข้อมูล', 'กรุณารอสักครู่...');
            
            const payload = {
                action: 'updateLineOrder',
                data: {
                    id: currentOrderId,
                    confirmDate: document.getElementById('edit-confirm-date').value,
                    adminName: document.getElementById('edit-admin-name').value,
                    hospitalName: document.getElementById('edit-hospital-name').value,
                    taxId: document.getElementById('edit-tax-id').value,
                    phone: document.getElementById('edit-phone').value
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                loadingToast.remove();
                btn.disabled = false;

                if (res.status === 'success') {
                    showToast('success', 'สำเร็จ', 'บันทึกข้อมูลออเดอร์เรียบร้อยแล้ว');
                    isEditing = false; 
                } else {
                    showToast('error', 'ล้มเหลว', res.message || 'บันทึกไม่สำเร็จ');
                }
            } catch (error) {
                if(loadingToast) loadingToast.remove();
                btn.disabled = false;
                showToast('error', 'เชื่อมต่อล้มเหลว', error.message);
            }
        }

        // สั่งให้ AI สแกนวิเคราะห์ใหม่อีกครั้ง
        async function triggerAIOrderProcess() {
            const btn = document.getElementById('ai-btn');
            btn.disabled = true;
            const loadingToast = showToast('loading', '🤖 AI กำลังวิเคราะห์บิล', 'กำลังส่งคำสั่งวิเคราะห์ข้อมูลใหม่...');
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: 'processAIOrder', id: currentOrderId })
                });
                const res = await response.json();
                loadingToast.remove();
                btn.disabled = false;

                if (res.status === 'success' && res.data) {
                    mapDataToForm(res.data);
                    showToast('success', 'วิเคราะห์สำเร็จ', 'AI อัปเดตข้อมูลให้ใหม่เรียบร้อยครับ');
                    isEditing = false;
                } else {
                    showToast('error', 'AI ประมวลผลล้มเหลว', res.message || 'กรุณาลองใหม่อีกครั้ง');
                }
            } catch (error) {
                if(loadingToast) loadingToast.remove();
                btn.disabled = false;
                showToast('error', 'เชื่อมต่อ AI ล้มเหลว', error.message);
            }
        }

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                fetchOrderData();
            }, 5000);
        }

        document.getElementById('order-edit-form').addEventListener('input', () => {
            isEditing = true;
            document.getElementById('status-text').innerText = "✍️ กำลังพิมพ์แก้ไข... (หยุดรีเฟรชชั่วคราว)";
        });

        function showToast(type, title, message) {
            const oldToast = document.getElementById('custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#8b5cf6';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '8px';
            toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            toast.style.zIndex = '9999';
            toast.style.width = '90%';
            toast.style.maxWidth = '350px';
            toast.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
            
            document.body.appendChild(toast);
            if (type !== 'loading') { setTimeout(() => { toast.remove(); }, 4000); }
            return { remove: () => toast.remove() };
        }
    </script>
</body>
</html>
