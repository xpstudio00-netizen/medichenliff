<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDICHEN - ตรวจสอบและแก้ไขออเดอร์</title>
    <!-- โหลด Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; border-radius: 10px; }
        .img-preview { max-width: 100%; height: auto; border-radius: 8px; border: 2px dashed #ccc; }
        .table-items input { min-width: 80px; }
    </style>
    <!-- โหลดฟอนต์ Sarabun สำหรับภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container-fluid py-4">
    <div class="row mb-3">
        <div class="col-12 text-center">
            <h2 class="fw-bold text-primary"><i class="bi bi-clipboard-check"></i> ระบบยืนยันออเดอร์ (Confirm Order)</h2>
            <p id="orderIdDisplay" class="text-muted">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <div class="row">
        <!-- ฝั่งซ้าย: ดูรูปภาพใบสั่งซื้อ -->
        <div class="col-lg-5 mb-4">
            <div class="card p-3 h-100">
                <h5 class="fw-bold border-bottom pb-2"><i class="bi bi-image"></i> เอกสารอ้างอิง (PO)</h5>
                <div class="text-center mt-3">
                    <img id="poImage" src="https://via.placeholder.com/600x800?text=กำลังโหลดรูปภาพ..." class="img-preview" alt="PO Image">
                </div>
            </div>
        </div>

        <!-- ฝั่งขวา: ฟอร์มแก้ไขข้อมูล -->
        <div class="col-lg-7 mb-4">
            <div class="card p-4 h-100">
                <form id="editOrderForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">วันที่คอนเฟิร์ม (อิงจากเอกสาร)</label>
                            <input type="text" id="confirmDate" class="form-control" placeholder="เช่น 15/6/69">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">ชื่อคนคอนเฟิร์ม (แอดมิน)</label>
                            <input type="text" id="adminName" class="form-control" placeholder="ชื่อแอดมิน" required>
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label fw-bold">ชื่อโรงพยาบาล / ลูกค้า</label>
                            <input type="text" id="hospitalName" class="form-control" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">เลขที่ผู้เสียภาษี</label>
                            <input type="text" id="taxId" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">เบอร์โทรศัพท์</label>
                            <input type="text" id="phone" class="form-control">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">ที่อยู่จัดส่ง / ออกบิล</label>
                            <textarea id="address" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">เลขที่ PO</label>
                            <input type="text" id="poNumber" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">หมายเหตุ</label>
                            <input type="text" id="note" class="form-control" placeholder="ถ้ามี">
                        </div>

                        <!-- ส่วนรายการสินค้า -->
                        <div class="col-12 mt-4">
                            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
                                <h5 class="fw-bold mb-0"><i class="bi bi-box-seam"></i> รายการสินค้า</h5>
                                <button type="button" class="btn btn-sm btn-success" onclick="addItemRow()">+ เพิ่มรายการ</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-items" id="itemsTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>ชื่อสินค้า</th>
                                            <th width="15%">หน่วยละ</th>
                                            <th width="15%">จำนวน</th>
                                            <th width="20%">รวมเป็นเงิน</th>
                                            <th width="10%">ลบ</th>
                                        </tr>
                                    </thead>
                                    <tbody id="itemsBody">
                                        <!-- สินค้าจะถูกเพิ่มที่นี่ผ่าน JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- ส่วนสรุปยอดและเงื่อนไข -->
                        <div class="col-md-4">
                            <label class="form-label fw-bold">ยอดรวมสุทธิ (บาท)</label>
                            <input type="number" id="totalAmount" class="form-control fw-bold text-danger" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">รูปแบบภาษี (VAT)</label>
                            <select id="vatType" class="form-select">
                                <option value="สินค้ารวม VAT">สินค้ารวม VAT</option>
                                <option value="สินค้าไม่รวม VAT">สินค้าไม่รวม VAT</option>
                                <option value="สินค้าไม่มี VAT">สินค้าไม่มี VAT</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">เงื่อนไขการชำระเงิน</label>
                            <input type="text" id="conditions" class="form-control" value="ชำระเงินใน 30 วัน">
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label fw-bold">กำหนดส่ง</label>
                            <input type="text" id="deliveryDate" class="form-control" placeholder="เช่น ด่วน / หรือ ระบุวันที่">
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold" id="btnSubmit">
                                <i class="bi bi-send-check"></i> บันทึกและยืนยันออเดอร์
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔴 กำหนดค่าคอนฟิกพื้นฐาน (ใช้ API ตัวเดียวกับฟอร์มแรก)
const API_URL = "https://script.google.com/macros/s/AKfycbzUSfC0UMS1rLJTpVBbL1koAKUkHZcLIlQvLz98J2UzSwFUo-2sdqckWaiXNoEGgWJd/exec";

// 📦 จัดการ State ของหน้าจอ
let currentOrderId = null;
let isEditing = false; // ตัวล็อกระบบ Auto-refresh
let refreshInterval = null;

// 1. ฟังก์ชันทำงานอัตโนมัติเมื่อเปิดหน้าจอ
document.addEventListener("DOMContentLoaded", () => {
    // ดึง ID ออเดอร์จาก URL (เช่น ?id=12345)
    const urlParams = new URLSearchParams(window.location.search);
    currentOrderId = urlParams.get('id');

    if (!currentOrderId) {
        showToast('error', 'ข้อผิดพลาด', 'ไม่พบรหัสออเดอร์ (ID) ใน URL ไม่สามารถดึงข้อมูลได้');
        return;
    }

    // ใส่ ID รอไว้ในฟอร์มช่องลับหรือช่องแสดง ID
    const idInput = document.getElementById('edit-line-id');
    if (idInput) idInput.value = currentOrderId;

    // เรียกดึงข้อมูลครั้งแรกทันที
    fetchOrderData();

    // เปิดระบบ Auto-refresh ทุกๆ 5 วินาที
    startAutoRefresh();

    // ตรวจจับการพิมพ์ในฟอร์ม: ถ้าผู้ใช้กำลังพิมพ์ให้หยุด Refresh ชั่วคราวเพื่อป้องกันข้อมูลหาย
    setupEditListeners();
});

// 2. ฟังก์ชันดึงข้อมูลจาก Google Sheets ตาม ID
async function fetchOrderData() {
    if (isEditing) return; // ถ้ากำลังแก้ไขอยู่ ห้ามรีเฟรชทับเด็ดขาด

    try {
        const response = await fetch(`${API_URL}?action=getOrder&id=${currentOrderId}`);
        const res = await response.json();

        if (res.status === 'success' && res.data) {
            // นำข้อมูลที่ได้จากชีตมากรอกลงใน Input แต่ละช่อง
            mapDataToForm(res.data);
        }
    } catch (error) {
        console.error("Fetch data failed:", error);
    }
}

// 3. ฟังก์ชันกรอกข้อมูลลงช่องฟอร์ม HTML
function mapDataToForm(data) {
    if (document.getElementById('edit-line-product')) document.getElementById('edit-line-product').value = data.product || '';
    if (document.getElementById('edit-line-qty')) document.getElementById('edit-line-qty').value = data.qty || '';
    if (document.getElementById('edit-line-unit')) document.getElementById('edit-line-unit').value = data.unit || '';
    if (document.getElementById('edit-line-price')) document.getElementById('edit-line-price').value = data.price || '';
    if (document.getElementById('edit-line-company')) document.getElementById('edit-line-company').value = data.company || '';
    if (document.getElementById('edit-line-destination')) document.getElementById('edit-line-destination').value = data.destination || '';
}

// 4. ฟังก์ชันบันทึกข้อมูลที่แก้ไขกลับไปที่ Sheets (เมื่อกดปุ่มบันทึก)
async function updateLineOrder() {
    const loadingToast = showToast('loading', 'กำลังบันทึกข้อมูล', 'กรุณารอสักครู่...');
    
    // เตรียมข้อมูลจากหน้าจอกลับส่งไปบันทึก
    const payload = {
        action: 'updateLineOrder',
        data: {
            id: currentOrderId,
            product: document.getElementById('edit-line-product').value,
            qty: document.getElementById('edit-line-qty').value,
            unit: document.getElementById('edit-line-unit').value,
            price: document.getElementById('edit-line-price').value,
            company: document.getElementById('edit-line-company').value,
            destination: document.getElementById('edit-line-destination').value
        }
    };

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        });
        const res = await response.json();
        loadingToast.remove(); // ปิดตัวหมุนโหลดเพื่อป้องกันบัคค้าง

        if (res.status === 'success') {
            showToast('success', 'สำเร็จ', 'บันทึกข้อมูลออเดอร์เรียบร้อยแล้ว');
            isEditing = false; // ปลดล็อกให้รีเฟรชข้อมูลต่อได้
        } else {
            showToast('error', 'ล้มเหลว', res.message || 'บันทึกไม่สำเร็จ');
        }
    } catch (error) {
        if(loadingToast) loadingToast.remove();
        showToast('error', 'เชื่อมต่อล้มเหลว', error.message);
    }
}

// 5. 🤖 ฟังก์ชันสั่งให้ Gemini AI ช่วยคัดแยกข้อมูลลงฟอร์มใหม่อีกครั้ง
async function triggerAIOrderProcess() {
    if (!currentOrderId) return;

    const loadingToast = showToast('loading', '🤖 Gemini AI กำลังวิเคราะห์', 'ระบบกำลังส่งคำสั่งคัดแยกข้อมูล...');
    
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: 'processAIOrder', id: currentOrderId })
        });
        const res = await response.json();
        loadingToast.remove();

        if (res.status === 'success' && res.data) {
            // เอาผลลัพธ์ที่ AI คัดแยกข้อมูลได้ล่าสุด มาหยอดใส่ฟอร์มทันที
            mapDataToForm(res.data);
            showToast('success', 'วิเคราะห์สำเร็จ', 'Gemini AI คัดแยกข้อมูลลงฟอร์มให้เรียบร้อยครับ');
        } else {
            showToast('error', 'AI ประมวลผลล้มเหลว', res.message || 'กรุณาลองใหม่อีกครั้ง');
        }
    } catch (error) {
        if(loadingToast) loadingToast.remove();
        showToast('error', 'เชื่อมต่อ AI ล้มเหลว', error.message);
    }
}

// 6. ระบบช่วยจัดการความลื่นไหลของหน้าเว็บ (Helper Functions)
function startAutoRefresh() {
    refreshInterval = setInterval(() => {
        fetchOrderData();
    }, 5000); // รีเฟรชทุกๆ 5 วินาที
}

function setupEditListeners() {
    // หาอินพุตทั้งหมดในฟอร์มเพื่อดักจับการพิมพ์
    const inputs = document.querySelectorAll('#order-edit-form input, #order-edit-form select, #order-edit-form textarea');
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            isEditing = true; // ล็อกการรีเฟรชทันทีที่มีการเปลี่ยนแปลงข้อมูลบนจอ
        });
    });
}

// ระบบสร้างป๊อปอัปแจ้งเตือนอัจฉริยะ (Toast notification)
function showToast(type, title, message) {
    // ลบ Toast เก่าออกก่อนสร้างใหม่ (ป้องกันบัคซ้อนแผง)
    const oldToast = document.getElementById('custom-toast');
    if (oldToast) oldToast.remove();

    const toast = document.createElement('div');
    toast.id = 'custom-toast';
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.right = '20px';
    toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#3b82f6';
    toast.style.color = 'white';
    toast.style.padding = '16px 24px';
    toast.style.borderRadius = '8px';
    toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
    toast.style.zIndex = '9999';
    toast.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
    
    document.body.appendChild(toast);

    // ถ้าไม่ใช่ประเภทโหลดหมุนค้าง ให้เคลียร์ตัวเองทิ้งใน 4 วินาที
    if (type !== 'loading') {
        setTimeout(() => { toast.remove(); }, 4000);
    }

    return {
        remove: () => toast.remove()
    };
}
</script>

<!-- โหลด Bootstrap JS (สำหรับ Component เล็กน้อย) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
