<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDICHEN - ตรวจสอบและแก้ไขออเดอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --ai-color: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        .header h2 {
            color: #2563eb;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #status-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .image-container {
            width: 100%;
            min-height: 150px;
            background: #f1f5f9;
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: none;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background-color: var(--surface);
            outline: none;
            transition: all 0.2s;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
            margin-bottom: 16px;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 600;
            color: #166534;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
        }

        .btn-success { background: var(--success); color: white; }
        .btn-ai { background: linear-gradient(135deg, var(--primary), var(--ai-color)); color: white; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .section-divider {
            margin: 24px 0 16px 0;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: #2563eb;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📋 ระบบยืนยันออเดอร์ (Confirm Order)</h2>
        <div id="status-text">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="card">
        <div class="card-title">🖼️ เอกสารอ้างอิง (PO)</div>
        <div class="image-container">
            <div id="img-placeholder" style="color: var(--text-muted); font-size: 14px;">กำลังโหลดรูปภาพเอกสาร...</div>
            <img id="po-image" src="" alt="เอกสารสั่งซื้อ">
        </div>
    </div>

    <div class="card">
        <form id="order-edit-form" onsubmit="event.preventDefault();">
            
            <div class="checkbox-group">
                <input type="checkbox" id="edit-allow-confirm">
                <label for="edit-allow-confirm">✅ อนุญาตคอนเฟิร์มออเดอร์ (ตรวจสอบผ่านแล้ว)</label>
            </div>

            <div class="section-divider">ส่วนที่ 1: ข้อมูลการดำเนินการ (Admin)</div>

            <div class="form-row">
                <div class="form-group">
                    <label>วันที่คอนเฟิร์ม</label>
                    <input type="date" id="edit-confirm-date" class="form-control">
                </div>
                <div class="form-group">
                    <label>เวลาคอนเฟิร์ม</label>
                    <input type="time" id="edit-confirm-time" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label>ชื่อคนคอนเฟิร์ม (แอดมิน)</label>
                <select id="edit-admin-name" class="form-control">
                    <option value="">-- เลือกระบุชื่อแอดมิน --</option>
                    <option value="มาร์ค">มาร์ค</option>
                    <option value="แอดมินท่านอื่น">แอดมินท่านอื่น</option>
                </select>
            </div>

            <div class="section-divider">ส่วนที่ 2: ข้อมูลจากเอกสาร PO (สแกนโดย AI)</div>

            <div class="form-group">
                <label>ชื่อโรงพยาบาล / ลูกค้า</label>
                <input type="text" id="edit-hospital-name" class="form-control">
            </div>

            <div class="form-group">
                <label>เลขที่ผู้เสียภาษี</label>
                <input type="text" id="edit-tax-id" class="form-control">
            </div>

            <div class="form-group">
                <label>ที่อยู่ (สำหรับจัดส่ง / ใบกำกับภาษี)</label>
                <textarea id="edit-address" class="form-control" placeholder="ที่อยู่..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>เบอร์โทรศัพท์</label>
                    <input type="text" id="edit-phone" class="form-control">
                </div>
                <div class="form-group">
                    <label>เลขที่ PO</label>
                    <input type="text" id="edit-po-number" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label>รายการออเดอร์ (สินค้า / จำนวน)</label>
                <textarea id="edit-items" class="form-control" placeholder="รายการสินค้า..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>ยอดรวมสุทธิ</label>
                    <input type="number" id="edit-total" class="form-control" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>การคิดภาษี (VAT)</label>
                    <select id="edit-vat-type" class="form-control">
                        <option value="">-- ระบุ VAT --</option>
                        <option value="สินค้ารวม VAT">สินค้ารวม VAT</option>
                        <option value="สินค้าไม่รวม VAT">สินค้าไม่รวม VAT</option>
                        <option value="สินค้าไม่มี VAT">สินค้าไม่มี VAT</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>เงื่อนไข (เช่น เครดิต 30 วัน)</label>
                    <input type="text" id="edit-conditions" class="form-control">
                </div>
                <div class="form-group">
                    <label>กำหนดส่ง (วัน/เดือน/ปี)</label>
                    <input type="text" id="edit-due-date" class="form-control" placeholder="เช่น ภายใน 7 วัน">
                </div>
            </div>

            <div class="form-group">
                <label>หมายเหตุ (จากเอกสาร หรือเพิ่มเติม)</label>
                <textarea id="edit-notes" class="form-control" placeholder="หมายเหตุ..."></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-success" id="save-btn" onclick="updateLineOrder()">💾 บันทึกข้อมูลออเดอร์</button>
                <button type="button" class="btn btn-ai" id="ai-btn" onclick="triggerAIOrderProcess()">🤖 สั่ง AI วิเคราะห์ใหม่อีกครั้ง</button>
            </div>
        </form>
    </div>

    <script>
        // 🔴 อย่าลืมเปลี่ยนเป็น URL Web App ตัวล่าสุด
        const API_URL = "https://script.google.com/macros/s/AKfycbzUSfC0UMS1rLJTpVBbL1koAKUkHZcLIlQvLz98J2UzSwFUo-2sdqckWaiXNoEGgWJd/exec";

        let currentOrderId = null;
        let isEditing = false;
        let refreshInterval = null;

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentOrderId = urlParams.get('id');

            if (!currentOrderId) {
                document.getElementById('status-text').innerText = "❌ ไม่พบรหัสออเดอร์ (ID) ใน URL";
                showToast('error', 'ข้อผิดพลาด', 'ไม่พบ ID ออเดอร์');
                return;
            }

            fetchOrderData();
            startAutoRefresh();
            setupEditListeners();
        });

        async function fetchOrderData() {
            if (isEditing) return;

            try {
                const response = await fetch(`${API_URL}?action=getOrder&id=${currentOrderId}`);
                const res = await response.json();

                if (res.status === 'success' && res.data) {
                    document.getElementById('status-text').innerText = `อัปเดตล่าสุดเมื่อ: ${new Date().toLocaleTimeString('th-TH')}`;
                    mapDataToForm(res.data);
                } else {
                    document.getElementById('status-text').innerText = "⚠️ ไม่พบข้อมูลออเดอร์นี้ในระบบ";
                }
            } catch (error) {
                console.error("Fetch data failed:", error);
                document.getElementById('status-text').innerText = "❌ เชื่อมต่อฐานข้อมูลล้มเหลว";
            }
        }

        // นำข้อมูลลงฟอร์ม 15 ช่อง
        function mapDataToForm(data) {
            // Checkbox
            if (document.getElementById('edit-allow-confirm')) document.getElementById('edit-allow-confirm').checked = data.allowConfirm === true || data.allowConfirm === "true";
            
            // Text / Date / Time Inputs
            if (document.getElementById('edit-confirm-date')) document.getElementById('edit-confirm-date').value = data.confirmDate || '';
            if (document.getElementById('edit-confirm-time')) document.getElementById('edit-confirm-time').value = data.confirmTime || '';
            if (document.getElementById('edit-hospital-name')) document.getElementById('edit-hospital-name').value = data.hospitalName || data.company || '';
            if (document.getElementById('edit-admin-name')) document.getElementById('edit-admin-name').value = data.adminName || '';
            if (document.getElementById('edit-tax-id')) document.getElementById('edit-tax-id').value = data.taxId || '';
            if (document.getElementById('edit-address')) document.getElementById('edit-address').value = data.address || data.destination || '';
            if (document.getElementById('edit-phone')) document.getElementById('edit-phone').value = data.phone || '';
            if (document.getElementById('edit-po-number')) document.getElementById('edit-po-number').value = data.poNumber || '';
            if (document.getElementById('edit-items')) document.getElementById('edit-items').value = data.product || data.items || '';
            if (document.getElementById('edit-total')) document.getElementById('edit-total').value = data.totalAmount || data.price || '';
            if (document.getElementById('edit-vat-type')) document.getElementById('edit-vat-type').value = data.vatType || '';
            if (document.getElementById('edit-conditions')) document.getElementById('edit-conditions').value = data.conditions || '';
            if (document.getElementById('edit-due-date')) document.getElementById('edit-due-date').value = data.dueDate || '';
            if (document.getElementById('edit-notes')) document.getElementById('edit-notes').value = data.notes || '';

            // แสดงรูปภาพ
            const poImage = document.getElementById('po-image');
            const placeholder = document.getElementById('img-placeholder');
            if (poImage && data.fileUrl) {
                poImage.src = data.fileUrl;
                poImage.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
            } else if (placeholder) {
                placeholder.innerText = "❌ ไม่พบไฟล์เอกสารแนบ";
            }
        }

        // มัดรวมข้อมูล 15 ช่องส่งกลับไปบันทึก
        async function updateLineOrder() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            const loadingToast = showToast('loading', 'กำลังบันทึกข้อมูล', 'กรุณารอสักครู่...');
            
            const payload = {
                action: 'updateLineOrder',
                data: {
                    id: currentOrderId,
                    allowConfirm: document.getElementById('edit-allow-confirm').checked,
                    confirmDate: document.getElementById('edit-confirm-date').value,
                    confirmTime: document.getElementById('edit-confirm-time').value,
                    hospitalName: document.getElementById('edit-hospital-name').value,
                    adminName: document.getElementById('edit-admin-name').value,
                    taxId: document.getElementById('edit-tax-id').value,
                    address: document.getElementById('edit-address').value,
                    phone: document.getElementById('edit-phone').value,
                    poNumber: document.getElementById('edit-po-number').value,
                    items: document.getElementById('edit-items').value,
                    totalAmount: document.getElementById('edit-total').value,
                    vatType: document.getElementById('edit-vat-type').value,
                    conditions: document.getElementById('edit-conditions').value,
                    dueDate: document.getElementById('edit-due-date').value,
                    notes: document.getElementById('edit-notes').value
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                loadingToast.remove();
                btn.disabled = false;

                if (res.status === 'success') {
                    showToast('success', 'สำเร็จ', 'บันทึกข้อมูลออเดอร์เรียบร้อยแล้ว');
                    isEditing = false; 
                } else {
                    showToast('error', 'ล้มเหลว', res.message || 'บันทึกไม่สำเร็จ');
                }
            } catch (error) {
                if(loadingToast) loadingToast.remove();
                btn.disabled = false;
                showToast('error', 'เชื่อมต่อล้มเหลว', error.message);
            }
        }

        async function triggerAIOrderProcess() {
            const btn = document.getElementById('ai-btn');
            btn.disabled = true;
            const loadingToast = showToast('loading', '🤖 AI กำลังวิเคราะห์บิล', 'กำลังส่งคำสั่งวิเคราะห์ข้อมูลใหม่...');
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: 'processAIOrder', id: currentOrderId })
                });
                const res = await response.json();
                loadingToast.remove();
                btn.disabled = false;

                if (res.status === 'success' && res.data) {
                    mapDataToForm(res.data);
                    showToast('success', 'วิเคราะห์สำเร็จ', 'AI อัปเดตข้อมูลให้ใหม่เรียบร้อยครับ');
                    isEditing = false;
                } else {
                    showToast('error', 'AI ประมวลผลล้มเหลว', res.message || 'กรุณาลองใหม่อีกครั้ง');
                }
            } catch (error) {
                if(loadingToast) loadingToast.remove();
                btn.disabled = false;
                showToast('error', 'เชื่อมต่อ AI ล้มเหลว', error.message);
            }
        }

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                fetchOrderData();
            }, 5000);
        }

        function setupEditListeners() {
            document.getElementById('order-edit-form').addEventListener('input', () => {
                isEditing = true;
                document.getElementById('status-text').innerText = "✍️ กำลังพิมพ์แก้ไข... (หยุดรีเฟรชชั่วคราว)";
            });
        }

        function showToast(type, title, message) {
            const oldToast = document.getElementById('custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#8b5cf6';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '8px';
            toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            toast.style.zIndex = '9999';
            toast.style.width = '90%';
            toast.style.maxWidth = '350px';
            toast.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
            
            document.body.appendChild(toast);
            if (type !== 'loading') { setTimeout(() => { toast.remove(); }, 4000); }
            return { remove: () => toast.remove() };
        }
    </script>
</body>
</html>
